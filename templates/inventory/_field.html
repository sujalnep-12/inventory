<div>
    <label class="mb-1 block text-sm font-medium text-slate-700" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
        <p class="mt-1 text-xs text-slate-500">{{ field.help_text }}</p>
    {% endif %}
    {% for error in field.errors %}
        <p class="mt-1 text-xs font-medium text-rose-600">{{ error }}</p>
    {% endfor %}
</div>
